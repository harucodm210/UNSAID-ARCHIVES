<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unsaid Archive</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ==================== BASE ==================== */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #fbc2eb);
            color: #222;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ==================== CENTERED CARD ==================== */
        .centerCard {
            background: #ffffffee; /* slightly transparent white */
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .centerCard:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.25);
        }

        /* ==================== TITLE & SUBTITLE ==================== */
        .title {
            font-size: 42px;
            margin-bottom: 10px;
            color: #ff1a6b;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .subtitle {
            font-size: 16px;
            margin-bottom: 30px;
            color: #333;
            opacity: 0.9;
            line-height: 1.5;
        }

        /* ==================== BUTTON ==================== */
        .enterButton {
            width: 100%;
            padding: 14px;
            border: none;
            background: #ff4d88;
            color: white;
            font-weight: bold;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        .enterButton:hover {
            background: #e6006a;
            transform: translateY(-2px);
        }

        /* ==================== FOOTER ==================== */
        footer {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #fff;
            opacity: 0.8;
            position: absolute;
            bottom: 10px;
            width: 100%;
        }

        /* ==================== RESPONSIVE ==================== */
        @media screen and (max-width: 400px) {
            .centerCard {
                padding: 30px 20px;
            }
            .title {
                font-size: 32px;
            }
            .subtitle {
                font-size: 14px;
            }
            .enterButton {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="centerCard">
        <h1 class="title">💗 Unsaid Archive</h1>
        <p class="subtitle">
            Some feelings were never spoken.<br>
            Some letters were never delivered.
        </p>

        <!-- Enter Archive Button -->
        <button class="enterButton" onclick="enterArchive()">Enter Archive</button>
    </div>

    <footer>
        &copy; MXE2026. All rights reserved.
    </footer>

    <script>
        function enterArchive(){
            window.location = "dashboard.html";
        }
    </script>

</body>
</html>
