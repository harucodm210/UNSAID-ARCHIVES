<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Unsaid Archive</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Dashboard page improvements */

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #fbc2eb);
            color: #222;
        }

        .layout {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #ffffffee; /* semi-opaque white */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(10px);
            border-right: 1px solid #ffd1e0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .sidebar h2 {
            margin-top: 0;
            color: #ff1a6b;
            text-align: center;
        }

        .sidebar input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 100%;
            font-size: 14px;
        }

        .sidebar button {
            background: #ff4d88;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .sidebar button:hover {
            background: #e6006a;
        }

        .sidebar a {
            text-decoration: none;
            color: #ff1a6b;
            font-weight: bold;
            padding: 8px 0;
            transition: color 0.2s;
        }
        .sidebar a:hover {
            color: #e6006a;
        }

        /* MAIN AREA */
        .main {
            flex: 1;
            padding: 40px;
            background: #fff;
            border-top-left-radius: 20px;
            overflow-y: auto;
        }

        .main h1 {
            color: #ff1a6b;
            margin-bottom: 20px;
        }

        /* LETTER BOX */
        .letterBox {
            background: #fff0f6;
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .letterBox input,
        .letterBox textarea {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .letterBox textarea {
            height: 150px;
            resize: vertical;
        }

        .letterBox button {
            background: #ff4d88;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
        }

        .letterBox button:hover {
            background: #e6006a;
            transform: translateY(-2px);
        }

        /* PUBLISHED LETTER ANIMATION */
        #animationContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 1000;
        }

        /* Responsive */
        @media screen and (max-width: 600px) {
            .layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-around;
            }
            .main {
                padding: 20px;
                border-radius: 0;
            }
            .letterBox {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>💗 Unsaid</h2>
        <input id="searchInput" placeholder="Search name">
        <button onclick="searchLetters()">Search</button>
        <hr>
        <a href="dashboard.html">Write Letter</a>
        <a href="archive.html">Archive</a>
    </div>

    <!-- Main -->
    <div class="main">
        <h1>Write an Unsaid Letter</h1>

        <div class="letterBox">
            <input id="name" placeholder="Your name">
            <textarea id="message" placeholder="Write the words you never said..."></textarea>
            <input id="spotify" placeholder="Spotify song link (optional)">
            <button onclick="publishLetter()">Publish</button>
        </div>

        <!-- Center animation for published letter -->
        <div id="animationContainer"></div>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
